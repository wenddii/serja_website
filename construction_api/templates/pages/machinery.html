{% extends "base.html" %}

{% block content %}

<section class="container mx-auto py-16">

    <h1 class="text-4xl font-bold mb-10">
        Our Machinery
    </h1>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

        {% for machine in machineries %}

        <div class="bg-white rounded-xl shadow">

            <img
                src="{{ machine.image.url }}"
                alt="{{ machine.name }}"
                class="w-full h-64 object-cover rounded-t-xl"
            >

            <div class="p-6">

                <h2 class="text-2xl font-semibold">
                    {{ machine.name }}
                </h2>

                <p class="text-gray-500">
                    {{ machine.category }}
                </p>

                <p class="mt-4">
                    {{ machine.description|truncatewords:20 }}
                </p>

                <a
                    href="{% url 'machinery:detail' machine.pk %}"
                    class="inline-block mt-6"
                >
                    View Details →
                </a>

            </div>

        </div>

        {% empty %}

        <p>No machinery available.</p>

        {% endfor %}

    </div>

</section>

{% endblock %}
